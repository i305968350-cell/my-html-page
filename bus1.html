<!DOCTYPE html>

<style>

}

h3 {

}

.month {
  width: 610px;
  text-align: right;
  font-size: 16px;
  font-weight: bold;
  margin: 20px 0 10px;
}

table, td {
  border: solid 1px #aaaaaa;
}

table {
  width: 610px;
  border-collapse: collapse;
  font-size: 12px;
  border-top: solid 2px #888888;
  margin-bottom: 26px;
}

tr {
  height: 60px;
  vertical-align: top;
}

td {
  width: 76px;
  padding: 5px;
}

.day {
  height: 20px;
  background-color: #f8f9f2;
  text-align: center;

}

.red {

}

.blue {

}

.github-link {

  text-align: center;
  margin: 15px 0;
  font-size: 14px;
}

.github-link a {
  color: #0066cc;
  text-decoration: underline;
}
</style>
</head>
